services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    volumes:
      - ./ecommerce_dataset:/seed/ecommerce_dataset:ro
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minio minio123; do sleep 2; done;
      mc mb -p local/warehouse || true;
      mc mirror --overwrite /seed/ecommerce_dataset local/warehouse/ecommerce_dataset;
      exit 0;
      "

  airflow-init:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW_UID: "50000"
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY:-change_me_in_.env}
      SPARK_PROJECT_ROOT: /opt/airflow/project
      SPARK_JOB_SCRIPT_PATH: /opt/airflow/project/jobs/minio_spark_pipeline.py
      SPARK_SEED_SCRIPT_PATH: /opt/airflow/project/jobs/seed_input_to_minio.py
      SPARK_SUBMIT_BIN: spark-submit
      SPARK_MASTER: local[*]
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio123
      MINIO_BUCKET: warehouse
      MINIO_INPUT_PREFIX: products_parquet
      PIPELINE_CONFIG_DIR: /opt/airflow/project/config/pipelines
      MINIO_OUTPUT_PARTITION_COLS: etl_run_date
      PYTHONPATH: /opt/airflow/project
    volumes:
      - ./:/opt/airflow/project
      - ./dags:/opt/airflow/dags
    command: >
      bash -c "airflow db migrate && airflow users create \
      --username admin \
      --firstname Air \
      --lastname Flow \
      --role Admin \
      --email admin@example.com \
      --password admin || true"

  airflow-webserver:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY:-change_me_in_.env}
      SPARK_PROJECT_ROOT: /opt/airflow/project
      SPARK_JOB_SCRIPT_PATH: /opt/airflow/project/jobs/minio_spark_pipeline.py
      SPARK_SEED_SCRIPT_PATH: /opt/airflow/project/jobs/seed_input_to_minio.py
      SPARK_SUBMIT_BIN: spark-submit
      SPARK_MASTER: local[*]
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio123
      MINIO_BUCKET: warehouse
      MINIO_INPUT_PREFIX: products_parquet
      PIPELINE_CONFIG_DIR: /opt/airflow/project/config/pipelines
      MINIO_OUTPUT_PARTITION_COLS: etl_run_date
      PYTHONPATH: /opt/airflow/project
    volumes:
      - ./:/opt/airflow/project
      - ./dags:/opt/airflow/dags
    ports:
      - "8080:8080"
    command: webserver

  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY:-change_me_in_.env}
      SPARK_PROJECT_ROOT: /opt/airflow/project
      SPARK_JOB_SCRIPT_PATH: /opt/airflow/project/jobs/minio_spark_pipeline.py
      SPARK_SEED_SCRIPT_PATH: /opt/airflow/project/jobs/seed_input_to_minio.py
      SPARK_SUBMIT_BIN: spark-submit
      SPARK_MASTER: local[*]
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio123
      MINIO_BUCKET: warehouse
      MINIO_INPUT_PREFIX: products_parquet
      PIPELINE_CONFIG_DIR: /opt/airflow/project/config/pipelines
      MINIO_OUTPUT_PARTITION_COLS: etl_run_date
      PYTHONPATH: /opt/airflow/project
    volumes:
      - ./:/opt/airflow/project
      - ./dags:/opt/airflow/dags
    command: scheduler

volumes:
  postgres_data:
  minio_data:
