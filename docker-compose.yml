services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    volumes:
      - ./ecommerce_dataset:/seed/ecommerce_dataset:ro
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minio minio123; do sleep 2; done;
      mc mb -p local/warehouse || true;
      mc mirror --overwrite /seed/ecommerce_dataset local/warehouse/ecommerce_dataset;
      exit 0;
      "

  hive-metastore-postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
      POSTGRES_DB: metastore
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "hive", "-d", "metastore"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - hive_metastore_postgres_data:/var/lib/postgresql/data

  hive-metastore:
    build:
      context: .
      dockerfile: docker/hive-metastore/Dockerfile
    depends_on:
      hive-metastore-postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      HIVE_METASTORE_DRIVER: org.postgresql.Driver
      HIVE_METASTORE_JDBC_URL: jdbc:postgresql://hive-metastore-postgres:5432/metastore
      HIVE_METASTORE_USER: hive
      HIVE_METASTORE_PASSWORD: hive
      HIVE_METASTORE_WAREHOUSE_DIR: s3://warehouse/
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio123
      S3_PATH_STYLE_ACCESS: "true"
      S3_SSL_ENABLED: "false"
      REGION: us-east-1
      GOOGLE_CLOUD_KEY_FILE_PATH: ""
      AZURE_ADL_CLIENT_ID: ""
      AZURE_ADL_CREDENTIAL: ""
      AZURE_ADL_REFRESH_URL: ""
      AZURE_ABFS_STORAGE_ACCOUNT: ""
      AZURE_ABFS_ACCESS_KEY: ""
      AZURE_WASB_STORAGE_ACCOUNT: ""
      AZURE_ABFS_OAUTH: ""
      AZURE_ABFS_OAUTH_TOKEN_PROVIDER: ""
      AZURE_ABFS_OAUTH_CLIENT_ID: ""
      AZURE_ABFS_OAUTH_SECRET: ""
      AZURE_ABFS_OAUTH_ENDPOINT: ""
      AZURE_WASB_ACCESS_KEY: ""
    ports:
      - "9083:9083"

  trino:
    image: trinodb/trino:481
    depends_on:
      - hive-metastore
      - minio
    volumes:
      - ./docker/trino/catalog:/etc/trino/catalog:ro
      - ./docker/trino/sql:/sql:ro
    ports:
      - "8082:8080"

  trino-init:
    image: trinodb/trino:481
    depends_on:
      - trino
      - hive-metastore
    volumes:
      - ./docker/trino/sql:/sql:ro
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "until trino --server http://trino:8080 --file /sql/create_gold_tables.sql;
      do echo 'Waiting for Trino/Hive metastore...'; sleep 5; done"

  metabase-postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: metabase
      POSTGRES_PASSWORD: metabase
      POSTGRES_DB: metabase
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "metabase", "-d", "metabase"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - metabase_postgres_data:/var/lib/postgresql/data

  metabase:
    image: metabase/metabase:v0.56.7
    restart: always
    depends_on:
      metabase-postgres:
        condition: service_healthy
      trino-init:
        condition: service_completed_successfully
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: metabase
      MB_DB_PASS: metabase
      MB_DB_HOST: metabase-postgres
    ports:
      - "3000:3000"

  airflow-init:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW_UID: "50000"
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY:-change_me_in_.env}
      SPARK_PROJECT_ROOT: /opt/airflow/project
      SPARK_JOB_SCRIPT_PATH: /opt/airflow/project/jobs/minio_spark_pipeline.py
      SPARK_SEED_SCRIPT_PATH: /opt/airflow/project/jobs/seed_input_to_minio.py
      SPARK_SUBMIT_BIN: spark-submit
      SPARK_MASTER: local[*]
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio123
      MINIO_BUCKET: warehouse
      MINIO_INPUT_PREFIX: products_parquet
      PIPELINE_CONFIG_DIR: /opt/airflow/project/config/pipelines
      MINIO_OUTPUT_PARTITION_COLS: etl_run_date
      PYTHONPATH: /opt/airflow/project
    volumes:
      - ./:/opt/airflow/project
      - ./dags:/opt/airflow/dags
    command: >
      bash -c "airflow db migrate && airflow users create \
      --username admin \
      --firstname Air \
      --lastname Flow \
      --role Admin \
      --email admin@example.com \
      --password admin || true"

  airflow-webserver:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY:-change_me_in_.env}
      SPARK_PROJECT_ROOT: /opt/airflow/project
      SPARK_JOB_SCRIPT_PATH: /opt/airflow/project/jobs/minio_spark_pipeline.py
      SPARK_SEED_SCRIPT_PATH: /opt/airflow/project/jobs/seed_input_to_minio.py
      SPARK_SUBMIT_BIN: spark-submit
      SPARK_MASTER: local[*]
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio123
      MINIO_BUCKET: warehouse
      MINIO_INPUT_PREFIX: products_parquet
      PIPELINE_CONFIG_DIR: /opt/airflow/project/config/pipelines
      MINIO_OUTPUT_PARTITION_COLS: etl_run_date
      PYTHONPATH: /opt/airflow/project
    volumes:
      - ./:/opt/airflow/project
      - ./dags:/opt/airflow/dags
    ports:
      - "8080:8080"
    command: webserver

  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY:-change_me_in_.env}
      SPARK_PROJECT_ROOT: /opt/airflow/project
      SPARK_JOB_SCRIPT_PATH: /opt/airflow/project/jobs/minio_spark_pipeline.py
      SPARK_SEED_SCRIPT_PATH: /opt/airflow/project/jobs/seed_input_to_minio.py
      SPARK_SUBMIT_BIN: spark-submit
      SPARK_MASTER: local[*]
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio123
      MINIO_BUCKET: warehouse
      MINIO_INPUT_PREFIX: products_parquet
      PIPELINE_CONFIG_DIR: /opt/airflow/project/config/pipelines
      MINIO_OUTPUT_PARTITION_COLS: etl_run_date
      PYTHONPATH: /opt/airflow/project
    volumes:
      - ./:/opt/airflow/project
      - ./dags:/opt/airflow/dags
    command: scheduler

volumes:
  postgres_data:
  minio_data:
  hive_metastore_postgres_data:
  metabase_postgres_data:
